---
name: ftp_auditor

protocol_inspection:
  data0_buffer_size: 16KB
  inspect_max_depth: 5
  data0_wait_timeout: 5s
  data0_read_timeout: 5s
  data0_size_limit:
    ftp_server_greeting_msg: 2KB

# TLS 拦截配置（FTPS 上传审计需要）
tls_cert_generator: { }
tls_interception_client: { }
tls_ticketer: { }

h1_interception:
  req_hasbody: true
  req_body_min_size: 8

# ICAP 服务配置
#icap_reqmod_service: icap://127.0.0.1:1344/echo

application_audit_ratio: 1.0
