---
runtime:
  thread_number: 2


log: stdout

auditor:
  - name: default
    protocol_inspection: { }
    tls_cert_generator: { }
    tls_interception_client: { } # 代理对目标地址TLS连接参数
    tls_ticketer: { }
    h1_interception: { }
    #h2_interception: { } 
    application_audit_ratio: 1.0

    # tls_stream_dump: { }
    icap_reqmod_service: icap://127.0.0.1:1344/echo
    

server:
  - name: http
    escaper: default
    auditor: default
    type: http_proxy
    listen:
      address: "[::]:10087"
    tls_client: { }
  - name: socks
    escaper: default
    auditor: default
    type: socks_proxy
    listen:
      address: "[::]:10088"

resolver:
  - name: default
    type: c-ares

escaper:
  - name: default
    type: direct_fixed
    resolver: default
